<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>汉字 Flash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans:wght@300;400;600&display=swap');

  :root {
    --bg:       #0f0e0c;
    --surface:  #1a1814;
    --surface2: #242018;
    --border:   #2e2a22;
    --text:     #e8e0d0;
    --muted:    #7a7060;
    --accent:   #c8a96e;
    --soft:     #a09080;
    --hsk1:     #4caf7d;
    --hsk2:     #5b9bd5;
    --hsk3:     #b07fd4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
    display: flex;
    align-items: baseline;
    gap: 7px;
  }
  .version {
    font-family: 'Noto Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .direction-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: color 0.3s, border-color 0.3s;
  }
  .direction-badge.zh { color: var(--accent); border-color: var(--accent); }
  .direction-badge.en { color: #7ab8d4;       border-color: #7ab8d4; }

  /* ── Settings bars ── */
  .settings {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .settings::-webkit-scrollbar { display: none; }
  .settings-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pill {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: 'Noto Sans', sans-serif;
    transition: all 0.15s;
  }
  .pill:active { transform: scale(0.95); }

  /* HSK multi-select — each level has its own color when active */
  .pill.hsk-all.active { color: var(--accent); border-color: var(--accent); background: #c8a96e18; }
  .pill.hsk-1.active   { color: var(--hsk1);   border-color: var(--hsk1);  background: #4caf7d18; }
  .pill.hsk-2.active   { color: var(--hsk2);   border-color: var(--hsk2);  background: #5b9bd518; }
  .pill.hsk-3.active   { color: var(--hsk3);   border-color: var(--hsk3);  background: #b07fd418; }
  .pill.dir.active     { color: var(--text);   border-color: var(--soft);  background: #a0908018; }

  /* ── Card area ── */
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
    position: relative;
  }

  .card-shadow {
    position: absolute;
    width: calc(100% - 64px);
    max-width: 388px;
    height: 60px;
    background: var(--surface2);
    border: 1px solid #252118;
    border-radius: 20px;
    transform: translateY(12px) scale(0.95);
    z-index: 1;
    pointer-events: none;
  }

  .card {
    width: calc(100% - 32px);
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 24px;
    position: relative;
    cursor: pointer;
    user-select: none;
    z-index: 2;
  }

  @keyframes swipeLeft  { to { transform: translateX(-140%) rotate(-12deg); opacity: 0; } }
  @keyframes swipeRight { to { transform: translateX(140%)  rotate(12deg);  opacity: 0; } }
  @keyframes shadowRise {
    from { transform: translateY(12px) scale(0.95); }
    to   { transform: translateY(0px)  scale(1); }
  }
  .swiping-left  { animation: swipeLeft  0.26s ease-in  forwards; pointer-events: none; }
  .swiping-right { animation: swipeRight 0.26s ease-in  forwards; pointer-events: none; }
  .shadow-rise   { animation: shadowRise 0.26s ease-out forwards; }

  .front-label {
    position: absolute;
    top: 14px; left: 18px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .hsk-tag {
    position: absolute;
    top: 14px; right: 18px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid;
  }
  .hsk-tag.h1 { color: var(--hsk1); border-color: var(--hsk1); }
  .hsk-tag.h2 { color: var(--hsk2); border-color: var(--hsk2); }
  .hsk-tag.h3 { color: var(--hsk3); border-color: var(--hsk3); }

  .front-block {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 110px;
    margin-top: 8px;
  }
  .zh-big {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(36px, 10vw, 56px);
    line-height: 1.3;
    text-align: center;
  }
  .en-big {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 300;
    text-align: center;
    line-height: 1.5;
  }
  .tap-hint {
    margin-top: 20px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  .reveal-block {
    width: 100%;
    border-top: 1px solid var(--border);
    margin-top: 20px;
    padding-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.28s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .zh-reveal { font-family: 'Noto Serif SC', serif; font-size: clamp(26px,7vw,42px); text-align: center; }
  .py-reveal  { font-size: clamp(14px,3.8vw,19px); color: var(--soft); text-align: center; letter-spacing: 0.5px; }
  .en-reveal  { font-size: clamp(14px,3.8vw,18px); font-weight: 300; color: var(--soft); text-align: center; }

  .hidden { display: none !important; }

  /* ── Timer ── */
  .timer-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    height: 36px;
    gap: 8px;
    padding: 0 16px;
  }
  .timer-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    transition: opacity 0.25s;
  }
  .timer-bar.timer-hidden { opacity: 0; pointer-events: none; width: 0; overflow: hidden; }

  .timer-display {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--muted);
    min-width: 48px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }
  .timer-display.paused { color: #554e3e; }

  .timer-btn {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 3px 9px;
    cursor: pointer;
    font-family: 'Noto Sans', sans-serif;
    transition: all 0.15s;
  }
  .timer-btn:active { transform: scale(0.93); }
  .timer-btn.pause-active { color: var(--accent); border-color: var(--accent); }

  .timer-toggle {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--muted);
    cursor: pointer;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: none;
    font-family: 'Noto Sans', sans-serif;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .timer-toggle:active { transform: scale(0.93); }

  /* ── Controls ── */
  .controls {
    padding: 6px 16px 28px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .btn {
    border: none;
    border-radius: 50px;
    padding: 14px 0;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Noto Sans', sans-serif;
    cursor: pointer;
    min-width: 130px;
    transition: transform 0.12s, opacity 0.12s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-reveal { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-next   { background: var(--accent); color: #0f0e0c; }

  /* ── Status overlay ── */
  #status {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    font-size: 15px; color: var(--muted);
    gap: 12px;
    z-index: 99;
  }
  #status.hidden { display: none; }
  #statusMsg { text-align: center; padding: 0 32px; line-height: 1.6; }
</style>
</head>
<body>

<div id="status">
  <div style="font-family:'Noto Serif SC',serif;font-size:28px;color:var(--accent)">汉字</div>
  <div id="statusMsg">Loading sentences…</div>
</div>

<div class="header">
  <div class="logo">汉字 <span class="version">v1.4.1</span></div>
  <div class="direction-badge" id="dirBadge">—</div>
</div>

<!-- HSK multi-select -->
<div class="settings">
  <span class="settings-label">HSK</span>
  <button class="pill hsk-all active" data-hsk="all" onclick="toggleHSK('all')">All</button>
  <button class="pill hsk-1"          data-hsk="1"   onclick="toggleHSK('1')">HSK 1</button>
  <button class="pill hsk-2"          data-hsk="2"   onclick="toggleHSK('2')">HSK 2</button>
  <button class="pill hsk-3"          data-hsk="3"   onclick="toggleHSK('3')">HSK 3</button>
</div>
<!-- Direction -->
<div class="settings">
  <span class="settings-label">Direction</span>
  <button class="pill dir active" data-dir="random" onclick="setDir('random')">Random</button>
  <button class="pill dir"        data-dir="zh"     onclick="setDir('zh')">中 → EN</button>
  <button class="pill dir"        data-dir="en"     onclick="setDir('en')">EN → 中</button>
</div>

<div class="card-area">
  <div class="card-shadow" id="cardShadow"></div>
  <div class="card" id="card">
    <div class="front-label" id="frontLabel"></div>
    <div class="hsk-tag"     id="hskTag"></div>
    <div class="front-block" id="frontBlock"></div>
    <div class="tap-hint"    id="tapHint">tap to reveal</div>
    <div class="reveal-block hidden" id="revealBlock"></div>
  </div>
</div>

<!-- Timer -->
<div class="timer-wrapper">
  <div class="timer-bar" id="timerBar">
    <button class="timer-btn" id="btnPause" onclick="togglePause()">Pause</button>
    <span class="timer-display" id="timerDisplay">00:00</span>
    <button class="timer-btn" onclick="resetTimer()">Reset</button>
  </div>
  <button class="timer-toggle" id="timerToggle" onclick="toggleTimerVisible()">◎ hide</button>
</div>

<div class="controls">
  <button class="btn btn-reveal" id="btnReveal" onclick="revealCard()">Reveal</button>
  <button class="btn btn-next"   id="btnNext"   onclick="nextCard()">Next →</button>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let allSentences  = [];
let filtered      = [];
let current       = null;
let mode          = null;
let revealed      = false;
let animating     = false;

// HSK multi-select: set of active levels, or 'all'
let hskActive = new Set(['all']); // 'all' means no filter

// Direction
let dirSetting = 'random';

// ── CSV parser ─────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').slice(1);
  return lines.map(line => {
    const cols = line.split(',');
    return {
      zh:      cols[0]?.trim(),
      pinyin:  cols[1]?.trim(),
      english: cols[2]?.trim(),
      hsk:     parseInt(cols[3]?.trim()) || 1
    };
  }).filter(r => r.zh && r.english);
}

async function loadSentences() {
  try {
    const res  = await fetch('sentences.csv');
    const text = await res.text();
    allSentences = parseCSV(text);
    applyFilter();
    document.getElementById('status').classList.add('hidden');
    nextCard();
  } catch (e) {
    document.getElementById('statusMsg').textContent =
      "Could not load sentences.csv — make sure it's in the same folder.";
  }
}

// ── HSK multi-select ───────────────────────────────────────────────────
function toggleHSK(val) {
  if (val === 'all') {
    // All clears individual selections
    hskActive = new Set(['all']);
  } else {
    hskActive.delete('all');
    if (hskActive.has(val)) {
      hskActive.delete(val);
      // If nothing left, fall back to all
      if (hskActive.size === 0) hskActive = new Set(['all']);
    } else {
      hskActive.add(val);
    }
  }
  // Update pill states
  document.querySelectorAll('.pill[data-hsk]').forEach(p => {
    p.classList.toggle('active', hskActive.has(p.dataset.hsk));
  });
  applyFilter();
  nextCard();
}

function applyFilter() {
  if (hskActive.has('all')) {
    filtered = allSentences;
  } else {
    const levels = [...hskActive].map(Number);
    filtered = allSentences.filter(s => levels.includes(s.hsk));
  }
  if (filtered.length === 0) filtered = allSentences;
}

// ── Direction ──────────────────────────────────────────────────────────
function setDir(val) {
  dirSetting = val;
  document.querySelectorAll('.pill[data-dir]').forEach(p =>
    p.classList.toggle('active', p.dataset.dir === val));
}

// ── Card logic ─────────────────────────────────────────────────────────
function pickRandom() {
  let s;
  do { s = filtered[Math.floor(Math.random() * filtered.length)]; }
  while (s === current && filtered.length > 1);
  return s;
}

function nextCard() {
  revealed = false;
  current  = pickRandom();
  mode = dirSetting === 'zh' ? 'zh' : dirSetting === 'en' ? 'en' : (Math.random() < 0.5 ? 'zh' : 'en');
  render();
}

function render() {
  const badge       = document.getElementById('dirBadge');
  const frontLabel  = document.getElementById('frontLabel');
  const hskTag      = document.getElementById('hskTag');
  const frontBlock  = document.getElementById('frontBlock');
  const tapHint     = document.getElementById('tapHint');
  const revealBlock = document.getElementById('revealBlock');
  const btnReveal   = document.getElementById('btnReveal');

  revealBlock.classList.add('hidden');
  tapHint.classList.remove('hidden');
  btnReveal.classList.remove('hidden');

  hskTag.textContent = `HSK ${current.hsk}`;
  hskTag.className   = `hsk-tag h${current.hsk}`;

  if (mode === 'zh') {
    badge.textContent      = '中 → EN';
    badge.className        = 'direction-badge zh';
    frontLabel.textContent = 'Chinese → English';
    frontBlock.innerHTML   = `<div class="zh-big">${current.zh}</div>`;
    revealBlock.innerHTML  = `<div class="py-reveal">${current.pinyin}</div>
                               <div class="en-reveal">${current.english}</div>`;
  } else {
    badge.textContent      = 'EN → 中';
    badge.className        = 'direction-badge en';
    frontLabel.textContent = 'English → Chinese';
    frontBlock.innerHTML   = `<div class="en-big">${current.english}</div>`;
    revealBlock.innerHTML  = `<div class="zh-reveal">${current.zh}</div>
                               <div class="py-reveal">${current.pinyin}</div>`;
  }
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  document.getElementById('revealBlock').classList.remove('hidden');
  document.getElementById('tapHint').classList.add('hidden');
  document.getElementById('btnReveal').classList.add('hidden');
}

function animateSwipe(dir) {
  if (animating) return;
  animating = true;
  const card   = document.getElementById('card');
  const shadow = document.getElementById('cardShadow');
  shadow.classList.add('shadow-rise');
  card.classList.add(dir === 'left' ? 'swiping-left' : 'swiping-right');
  setTimeout(() => {
    card.classList.remove('swiping-left', 'swiping-right');
    shadow.classList.remove('shadow-rise');
    nextCard();
    animating = false;
  }, 260);
}

// ── Swipe gestures ─────────────────────────────────────────────────────
(function() {
  const card = document.getElementById('card');
  let startX = 0, startY = 0, isSwiping = false;
  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isSwiping = false;
  }, { passive: true });
  card.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) isSwiping = true;
  }, { passive: true });
  card.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (isSwiping && Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.2) {
      animateSwipe(dx < 0 ? 'left' : 'right');
    } else if (!isSwiping) {
      revealCard();
    }
    isSwiping = false;
  }, { passive: true });
  card.onclick = null;
})();

document.getElementById('btnNext').addEventListener('click', () => animateSwipe('left'));

// ── Timer ──────────────────────────────────────────────────────────────
let timerSeconds  = 0;
let timerPaused   = false;
let timerVisible  = true;
let timerInterval = null;

function pad(n) { return String(n).padStart(2, '0'); }

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent = `${pad(m)}:${pad(s)}`;
}

function startTimer() {
  timerInterval = setInterval(() => {
    if (!timerPaused) {
      timerSeconds++;
      updateTimerDisplay();
    }
  }, 1000);
}

function togglePause() {
  timerPaused = !timerPaused;
  const btn     = document.getElementById('btnPause');
  const display = document.getElementById('timerDisplay');
  btn.textContent = timerPaused ? 'Resume' : 'Pause';
  btn.classList.toggle('pause-active', timerPaused);
  display.classList.toggle('paused', timerPaused);
}

function resetTimer() {
  timerSeconds = 0;
  timerPaused  = false;
  const btn = document.getElementById('btnPause');
  btn.textContent = 'Pause';
  btn.classList.remove('pause-active');
  document.getElementById('timerDisplay').classList.remove('paused');
  updateTimerDisplay();
}

function toggleTimerVisible() {
  timerVisible = !timerVisible;
  const bar    = document.getElementById('timerBar');
  const toggle = document.getElementById('timerToggle');
  bar.classList.toggle('timer-hidden', !timerVisible);
  toggle.textContent = timerVisible ? '◎ hide' : 'timer ◉';
}

startTimer();
loadSentences();
</script>
</body>
</html>
