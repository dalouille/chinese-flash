<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>汉字 Flash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans:wght@300;400;600&display=swap');

  :root {
    --bg:       #0f0e0c;
    --surface:  #1a1814;
    --surface2: #242018;
    --border:   #2e2a22;
    --text:     #e8e0d0;
    --muted:    #7a7060;
    --accent:   #c8a96e;
    --soft:     #a09080;
    --hsk1:     #4caf7d;
    --hsk2:     #5b9bd5;
    --hsk3:     #b07fd4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
    display: flex;
    align-items: baseline;
    gap: 7px;
  }
  .version {
    font-family: 'Noto Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .direction-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: color 0.3s, border-color 0.3s;
  }
  .direction-badge.zh { color: var(--accent); border-color: var(--accent); }
  .direction-badge.en { color: #7ab8d4;       border-color: #7ab8d4; }

  /* ── Settings bars ── */
  .settings {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .settings::-webkit-scrollbar { display: none; }
  .settings-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pill {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: 'Noto Sans', sans-serif;
    transition: all 0.15s;
  }
  .pill:active { transform: scale(0.95); }
  .pill.hsk-all.active { color: var(--accent); border-color: var(--accent); background: #c8a96e18; }
  .pill.hsk-1.active   { color: var(--hsk1);   border-color: var(--hsk1);  background: #4caf7d18; }
  .pill.hsk-2.active   { color: var(--hsk2);   border-color: var(--hsk2);  background: #5b9bd518; }
  .pill.hsk-3.active   { color: var(--hsk3);   border-color: var(--hsk3);  background: #b07fd418; }
  .pill.dir.active     { color: var(--text);   border-color: var(--soft);  background: #a0908018; }

  /* ── Card area ── */
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
    position: relative;
  }
  .card-shadow {
    position: absolute;
    width: calc(100% - 64px);
    max-width: 388px;
    height: 60px;
    background: var(--surface2);
    border: 1px solid #252118;
    border-radius: 20px;
    transform: translateY(12px) scale(0.95);
    z-index: 1;
    pointer-events: none;
  }
  .card {
    width: calc(100% - 32px);
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 24px;
    position: relative;
    cursor: pointer;
    user-select: none;
    z-index: 2;
  }

  @keyframes swipeLeft  { to { transform: translateX(-140%) rotate(-12deg); opacity: 0; } }
  @keyframes swipeRight { to { transform: translateX(140%)  rotate(12deg);  opacity: 0; } }
  @keyframes shadowRise {
    from { transform: translateY(12px) scale(0.95); }
    to   { transform: translateY(0px)  scale(1); }
  }
  .swiping-left  { animation: swipeLeft  0.26s ease-in  forwards; pointer-events: none; }
  .swiping-right { animation: swipeRight 0.26s ease-in  forwards; pointer-events: none; }
  .shadow-rise   { animation: shadowRise 0.26s ease-out forwards; }

  .front-label {
    position: absolute;
    top: 14px; left: 18px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .hsk-tag {
    position: absolute;
    top: 14px; right: 18px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid;
  }
  .hsk-tag.h1 { color: var(--hsk1); border-color: var(--hsk1); }
  .hsk-tag.h2 { color: var(--hsk2); border-color: var(--hsk2); }
  .hsk-tag.h3 { color: var(--hsk3); border-color: var(--hsk3); }

  .front-block {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 110px;
    margin-top: 8px;
  }
  .zh-big {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(36px, 10vw, 56px);
    line-height: 1.3;
    text-align: center;
  }
  .en-big {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 300;
    text-align: center;
    line-height: 1.5;
  }
  .tap-hint {
    margin-top: 20px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  .reveal-block {
    width: 100%;
    border-top: 1px solid var(--border);
    margin-top: 20px;
    padding-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.28s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .zh-reveal { font-family: 'Noto Serif SC', serif; font-size: clamp(26px,7vw,42px); text-align: center; }
  .py-reveal  { font-size: clamp(14px,3.8vw,19px); color: var(--soft); text-align: center; letter-spacing: 0.5px; }
  .en-reveal  { font-size: clamp(14px,3.8vw,18px); font-weight: 300; color: var(--soft); text-align: center; }

  .hidden { display: none !important; }

  /* ── Bottom controls ── */
  .bottom {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding-bottom: 28px;
  }

  /* Row 1: Reset · timer · hide */
  .timer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 16px 6px;
    transition: opacity 0.25s;
  }
  .timer-row.paused-dim { opacity: 0.18; pointer-events: none; }

  .timer-display {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2.5px;
    color: var(--muted);
    min-width: 52px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .timer-small-btn {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    font-family: 'Noto Sans', sans-serif;
    transition: all 0.15s;
  }
  .timer-small-btn:active { transform: scale(0.93); }

  /* Row 2: ← · pause · → */
  .action-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 4px 16px 0;
  }

  .nav-btn {
    font-size: 20px;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 50%;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:active { transform: scale(0.93); }
  .nav-btn:disabled { opacity: 0.18; cursor: default; transform: none; }

  .pause-btn {
    width: 58px; height: 58px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .pause-btn:active  { transform: scale(0.93); }
  .pause-btn.paused  { background: var(--accent); color: #0f0e0c; }

  /* when paused, dim everything except pause button */
  .bottom.is-paused .timer-row   { opacity: 0.18; pointer-events: none; }
  .bottom.is-paused .nav-btn     { opacity: 0.18; pointer-events: none; }

  /* ── Status overlay ── */
  #status {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    font-size: 15px; color: var(--muted);
    gap: 12px;
    z-index: 99;
  }
  #status.hidden { display: none; }
  #statusMsg { text-align: center; padding: 0 32px; line-height: 1.6; }
</style>
</head>
<body>

<div id="status">
  <div style="font-family:'Noto Serif SC',serif;font-size:28px;color:var(--accent)">汉字</div>
  <div id="statusMsg">Loading sentences…</div>
</div>

<div class="header">
  <div class="logo">汉字 <span class="version">v1.6</span></div>
  <div class="direction-badge" id="dirBadge">—</div>
</div>

<div class="settings">
  <span class="settings-label">HSK</span>
  <button class="pill hsk-all active" data-hsk="all" onclick="toggleHSK('all')">All</button>
  <button class="pill hsk-1"          data-hsk="1"   onclick="toggleHSK('1')">HSK 1</button>
  <button class="pill hsk-2"          data-hsk="2"   onclick="toggleHSK('2')">HSK 2</button>
  <button class="pill hsk-3"          data-hsk="3"   onclick="toggleHSK('3')">HSK 3</button>
</div>
<div class="settings">
  <span class="settings-label">Direction</span>
  <button class="pill dir active" data-dir="random" onclick="setDir('random')">Random</button>
  <button class="pill dir"        data-dir="zh"     onclick="setDir('zh')">中 → EN</button>
  <button class="pill dir"        data-dir="en"     onclick="setDir('en')">EN → 中</button>
</div>

<div class="card-area">
  <div class="card-shadow" id="cardShadow"></div>
  <div class="card" id="card">
    <div class="front-label" id="frontLabel"></div>
    <div class="hsk-tag"     id="hskTag"></div>
    <div class="front-block" id="frontBlock"></div>
    <div class="tap-hint"    id="tapHint">tap to reveal</div>
    <div class="reveal-block hidden" id="revealBlock"></div>
  </div>
</div>

<div class="bottom" id="bottom">
  <!-- Row 1: Reset · xx:xx · hide -->
  <div class="timer-row" id="timerRow">
    <button class="timer-small-btn" onclick="resetTimer()">Reset</button>
    <span class="timer-display" id="timerDisplay">00:00</span>
    <button class="timer-small-btn" id="timerToggle" onclick="toggleTimerVisible()">hide</button>
  </div>

  <!-- Row 2: ← · pause · → -->
  <div class="action-row">
    <button class="nav-btn" id="btnBack"    onclick="historyBack()"    disabled>←</button>
    <button class="pause-btn" id="btnPause" onclick="togglePause()">⏸</button>
    <button class="nav-btn" id="btnForward" onclick="historyForward()" disabled>→</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let allSentences = [];
let filtered     = [];
let revealed     = false;
let animating    = false;
let hskActive    = new Set(['all']);
let dirSetting   = 'random';

// ── History ────────────────────────────────────────────────────────────
// Each entry: { sentence, mode }
const HIST_MAX   = 3;
let history      = [];   // oldest → newest
let historyPos   = -1;   // index of currently shown card

function historyPush(sentence, mode) {
  // If we're not at the end (user went back then moved forward), truncate future
  if (historyPos < history.length - 1) {
    history = history.slice(0, historyPos + 1);
  }
  history.push({ sentence, mode });
  if (history.length > HIST_MAX) history.shift();
  historyPos = history.length - 1;
  updateHistoryUI();
}

function historyBack() {
  if (historyPos <= 0) return;
  historyPos--;
  renderFromHistory();
}

function historyForward() {
  if (historyPos >= history.length - 1) return;
  historyPos++;
  renderFromHistory();
}

function renderFromHistory() {
  const entry = history[historyPos];
  revealed = false;
  render(entry.sentence, entry.mode);
  updateHistoryUI();
  resumeTimer();
}

function updateHistoryUI() {
  document.getElementById('btnBack').disabled    = historyPos <= 0;
  document.getElementById('btnForward').disabled = historyPos >= history.length - 1;

  // dots
  const dots = document.getElementById('histDots');
  dots.innerHTML = '';
  history.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'hist-dot' + (i === historyPos ? ' current' : ' visited');
    d.onclick = () => { historyPos = i; renderFromHistory(); };
    dots.appendChild(d);
  });
}

// ── CSV parser ─────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n').slice(1);
  return lines.map(line => {
    const cols = line.split(',');
    return {
      zh:      cols[0]?.trim(),
      pinyin:  cols[1]?.trim(),
      english: cols[2]?.trim(),
      hsk:     parseInt(cols[3]?.trim()) || 1
    };
  }).filter(r => r.zh && r.english);
}

async function loadSentences() {
  try {
    const res  = await fetch('sentences.csv');
    const text = await res.text();
    allSentences = parseCSV(text);
    applyFilter();
    document.getElementById('status').classList.add('hidden');
    nextCard();
  } catch (e) {
    document.getElementById('statusMsg').textContent =
      "Could not load sentences.csv — make sure it's in the same folder.";
  }
}

// ── HSK multi-select ───────────────────────────────────────────────────
function toggleHSK(val) {
  if (val === 'all') {
    hskActive = new Set(['all']);
  } else {
    hskActive.delete('all');
    if (hskActive.has(val)) {
      hskActive.delete(val);
      if (hskActive.size === 0) hskActive = new Set(['all']);
    } else {
      hskActive.add(val);
    }
  }
  document.querySelectorAll('.pill[data-hsk]').forEach(p =>
    p.classList.toggle('active', hskActive.has(p.dataset.hsk)));
  applyFilter();
  nextCard();
}

function applyFilter() {
  if (hskActive.has('all')) {
    filtered = allSentences;
  } else {
    const levels = [...hskActive].map(Number);
    filtered = allSentences.filter(s => levels.includes(s.hsk));
  }
  if (filtered.length === 0) filtered = allSentences;
}

// ── Direction ──────────────────────────────────────────────────────────
function setDir(val) {
  dirSetting = val;
  document.querySelectorAll('.pill[data-dir]').forEach(p =>
    p.classList.toggle('active', p.dataset.dir === val));
}

// ── Card logic ─────────────────────────────────────────────────────────
function pickRandom() {
  const last = history.length ? history[history.length - 1].sentence : null;
  let s;
  do { s = filtered[Math.floor(Math.random() * filtered.length)]; }
  while (s === last && filtered.length > 1);
  return s;
}

function nextCard() {
  const s    = pickRandom();
  const mode = dirSetting === 'zh' ? 'zh' : dirSetting === 'en' ? 'en' : (Math.random() < 0.5 ? 'zh' : 'en');
  historyPush(s, mode);
  revealed = false;
  render(s, mode);
  resumeTimer();
}

function render(sentence, mode) {
  const badge       = document.getElementById('dirBadge');
  const frontLabel  = document.getElementById('frontLabel');
  const hskTag      = document.getElementById('hskTag');
  const frontBlock  = document.getElementById('frontBlock');
  const tapHint     = document.getElementById('tapHint');
  const revealBlock = document.getElementById('revealBlock');
  revealBlock.classList.add('hidden');
  tapHint.classList.remove('hidden');

  hskTag.textContent = `HSK ${sentence.hsk}`;
  hskTag.className   = `hsk-tag h${sentence.hsk}`;

  if (mode === 'zh') {
    badge.textContent      = '中 → EN';
    badge.className        = 'direction-badge zh';
    frontLabel.textContent = 'Chinese → English';
    frontBlock.innerHTML   = `<div class="zh-big">${sentence.zh}</div>`;
    revealBlock.innerHTML  = `<div class="py-reveal">${sentence.pinyin}</div>
                               <div class="en-reveal">${sentence.english}</div>`;
  } else {
    badge.textContent      = 'EN → 中';
    badge.className        = 'direction-badge en';
    frontLabel.textContent = 'English → Chinese';
    frontBlock.innerHTML   = `<div class="en-big">${sentence.english}</div>`;
    revealBlock.innerHTML  = `<div class="zh-reveal">${sentence.zh}</div>
                               <div class="py-reveal">${sentence.pinyin}</div>`;
  }
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  document.getElementById('revealBlock').classList.remove('hidden');
  document.getElementById('tapHint').classList.add('hidden');
  resumeTimer();
}

function animateSwipe(dir) {
  if (animating) return;
  animating = true;
  const card   = document.getElementById('card');
  const shadow = document.getElementById('cardShadow');
  shadow.classList.add('shadow-rise');
  card.classList.add(dir === 'left' ? 'swiping-left' : 'swiping-right');
  setTimeout(() => {
    card.classList.remove('swiping-left', 'swiping-right');
    shadow.classList.remove('shadow-rise');
    nextCard();
    animating = false;
  }, 260);
}

// ── Swipe gestures ─────────────────────────────────────────────────────
(function() {
  const card = document.getElementById('card');
  let startX = 0, startY = 0, isSwiping = false;
  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isSwiping = false;
  }, { passive: true });
  card.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) isSwiping = true;
  }, { passive: true });
  card.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (isSwiping && Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.2) {
      animateSwipe(dx < 0 ? 'left' : 'right');
    } else if (!isSwiping) {
      revealCard();
    }
    isSwiping = false;
  }, { passive: true });
  card.onclick = null;
})();

// → button: go forward in history if possible, else new card
function historyForwardOrNext() {
  if (historyPos < history.length - 1) {
    historyForward();
  } else {
    animateSwipe('left');
  }
}
document.getElementById('btnForward').addEventListener('click', historyForwardOrNext);
// override the inline onclick
document.getElementById('btnForward').onclick = historyForwardOrNext;

// ── Timer ──────────────────────────────────────────────────────────────
let timerSeconds = 0;
let timerPaused  = false;
let timerVisible = true;

function pad(n) { return String(n).padStart(2, '0'); }

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent = `${pad(m)}:${pad(s)}`;
}

function resumeTimer() {
  if (!timerPaused) return;
  timerPaused = false;
  const btn = document.getElementById('btnPause');
  btn.textContent = '⏸';
  btn.classList.remove('paused');
  document.getElementById('bottom').classList.remove('is-paused');
}

function togglePause() {
  timerPaused = !timerPaused;
  const btn    = document.getElementById('btnPause');
  const bottom = document.getElementById('bottom');
  btn.textContent = timerPaused ? '▶' : '⏸';
  btn.classList.toggle('paused', timerPaused);
  bottom.classList.toggle('is-paused', timerPaused);
}

function resetTimer() {
  timerSeconds = 0;
  timerPaused  = false;
  const btn = document.getElementById('btnPause');
  btn.textContent = '⏸';
  btn.classList.remove('paused');
  document.getElementById('bottom').classList.remove('is-paused');
  updateTimerDisplay();
}

function toggleTimerVisible() {
  timerVisible = !timerVisible;
  const row    = document.getElementById('timerRow');
  const toggle = document.getElementById('timerToggle');
  // hide the display + reset but keep the toggle itself
  document.getElementById('timerDisplay').style.visibility = timerVisible ? '' : 'hidden';
  document.getElementById('timerDisplay').previousElementSibling.style.visibility = timerVisible ? '' : 'hidden';
  toggle.textContent = timerVisible ? 'hide' : 'show';
}

setInterval(() => {
  if (!timerPaused) { timerSeconds++; updateTimerDisplay(); }
}, 1000);

loadSentences();
</script>
</body>
</html>
