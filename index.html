<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>汉字 Flash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans:wght@300;400;600&display=swap');

  :root {
    --bg:      #0f0e0c;
    --surface: #1a1814;
    --surface2:#242018;
    --border:  #2e2a22;
    --text:    #f0e8d8;
    --muted:   #a8907a;
    --accent:  #d4b478;
    --soft:    #c0a890;
    --hsk1:    #4caf7d;
    --hsk2:    #5b9bd5;
    --hsk3:    #b07fd4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
    display: flex;
    align-items: baseline;
    gap: 7px;
  }
  .version {
    font-family: 'Noto Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--accent);
    opacity: 0.6;
  }
  .dir-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: color 0.3s, border-color 0.3s;
  }
  .dir-badge.zh { color: var(--accent); border-color: var(--accent); }
  .dir-badge.en { color: #7ab8d4;       border-color: #7ab8d4; }

  /* ── Settings bars ── */
  .settings {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .settings::-webkit-scrollbar { display: none; }
  .settings-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--soft);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pill {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: 'Noto Sans', sans-serif;
    transition: all 0.15s;
  }
  .pill:active { transform: scale(0.95); }
  .pill.hsk-all.active { color: var(--accent); border-color: var(--accent); background: #c8a96e18; }
  .pill.hsk-1.active   { color: var(--hsk1);   border-color: var(--hsk1);  background: #4caf7d18; }
  .pill.hsk-2.active   { color: var(--hsk2);   border-color: var(--hsk2);  background: #5b9bd518; }
  .pill.hsk-3.active   { color: var(--hsk3);   border-color: var(--hsk3);  background: #b07fd418; }
  .pill.dir.active     { color: var(--text);   border-color: var(--soft);  background: #a0908018; }

  /* ── Card area ── */
  .card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
    position: relative;
  }
  .card-shadow {
    position: absolute;
    width: calc(100% - 64px);
    max-width: 388px;
    height: 60px;
    background: var(--surface2);
    border: 1px solid #252118;
    border-radius: 20px;
    transform: translateY(12px) scale(0.95);
    z-index: 1;
    pointer-events: none;
  }
  .card {
    width: calc(100% - 32px);
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 24px;
    position: relative;
    cursor: pointer;
    user-select: none;
    z-index: 2;
  }
  @keyframes swipeLeft  { to { transform: translateX(-140%) rotate(-12deg); opacity: 0; } }
  @keyframes swipeRight { to { transform: translateX(140%)  rotate(12deg);  opacity: 0; } }
  @keyframes shadowRise {
    from { transform: translateY(12px) scale(0.95); }
    to   { transform: translateY(0)    scale(1); }
  }
  .swiping-left  { animation: swipeLeft  0.26s ease-in  forwards; pointer-events: none; }
  .swiping-right { animation: swipeRight 0.26s ease-in  forwards; pointer-events: none; }
  .shadow-rise   { animation: shadowRise 0.26s ease-out forwards; }

  .front-label {
    position: absolute;
    top: 14px; left: 18px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--soft);
  }
  .hsk-tag {
    position: absolute;
    top: 14px; right: 18px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid;
  }
  .hsk-tag.h1 { color: var(--hsk1); border-color: var(--hsk1); }
  .hsk-tag.h2 { color: var(--hsk2); border-color: var(--hsk2); }
  .hsk-tag.h3 { color: var(--hsk3); border-color: var(--hsk3); }

  .front-block {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 110px;
    margin-top: 8px;
  }
  .zh-big {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(36px, 10vw, 56px);
    line-height: 1.3;
    text-align: center;
  }
  .en-big {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 300;
    text-align: center;
    line-height: 1.5;
  }
  .tap-hint {
    margin-top: 20px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--soft);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  .reveal-block {
    width: 100%;
    border-top: 1px solid var(--border);
    margin-top: 20px;
    padding-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.28s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .zh-reveal { font-family: 'Noto Serif SC', serif; font-size: clamp(26px,7vw,42px); text-align: center; }
  .py-reveal  { font-size: clamp(14px,3.8vw,19px); color: var(--text); opacity: 0.7; text-align: center; letter-spacing: 0.5px; }
  .en-reveal  { font-size: clamp(14px,3.8vw,18px); font-weight: 300; color: var(--text); opacity: 0.7; text-align: center; }

  .hidden { display: none !important; }

  /* ── Bottom ── */
  .bottom {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 16px 36px;
    gap: 10px;
  }

  /* Row 1: Reset · 00:00 · hide */
  .timer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.3s;
  }
  .timer-display {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--text);
    min-width: 80px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .t-btn {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--soft);
    color: var(--soft);
    border-radius: 20px;
    padding: 5px 14px;
    cursor: pointer;
    font-family: 'Noto Sans', sans-serif;
    transition: all 0.15s;
  }
  .t-btn:active { transform: scale(0.93); }

  /* Row 2: ← · pause · → */
  .action-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  .nav-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 1.5px solid var(--soft);
    background: transparent;
    color: var(--soft);
    font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .nav-btn:active:not(.dimmed) { transform: scale(0.93); }
  .nav-btn.dimmed { opacity: 0.2; pointer-events: none; }

  .pause-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .pause-btn svg { transition: all 0.2s; }
  .pause-btn:active { transform: scale(0.93); }
  .pause-btn.is-paused { background: #d4b47822; }

  /* when paused: dim bottom controls and card */
  .bottom.is-paused .timer-row { opacity: 0.18; pointer-events: none; }
  .bottom.is-paused .nav-btn   { opacity: 0.08 !important; pointer-events: none; }
  .card-area.is-paused { opacity: 0.3; pointer-events: none; transition: opacity 0.3s; }
  .card-area { transition: opacity 0.3s; }

  /* ── Status overlay ── */
  #status {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    font-size: 15px; color: var(--muted);
    gap: 12px;
    z-index: 99;
  }
  #status.hidden { display: none; }
  #statusMsg { text-align: center; padding: 0 32px; line-height: 1.6; }
</style>
</head>
<body>

<div id="status">
  <div style="font-family:'Noto Serif SC',serif;font-size:28px;color:var(--accent)">汉字</div>
  <div id="statusMsg">Loading sentences…</div>
</div>

<div class="header">
  <div class="logo">汉字 <span class="version">v1.6.5</span></div>
  <div class="dir-badge" id="dirBadge">—</div>
</div>

<div class="settings">
  <span class="settings-label">HSK</span>
  <button class="pill hsk-all active" data-hsk="all" onclick="toggleHSK('all')">All</button>
  <button class="pill hsk-1"          data-hsk="1"   onclick="toggleHSK('1')">HSK 1</button>
  <button class="pill hsk-2"          data-hsk="2"   onclick="toggleHSK('2')">HSK 2</button>
  <button class="pill hsk-3"          data-hsk="3"   onclick="toggleHSK('3')">HSK 3</button>
</div>
<div class="settings">
  <span class="settings-label">Direction</span>
  <button class="pill dir active" data-dir="random" onclick="setDir('random')">Random</button>
  <button class="pill dir"        data-dir="zh"     onclick="setDir('zh')">中 → EN</button>
  <button class="pill dir"        data-dir="en"     onclick="setDir('en')">EN → 中</button>
</div>

<div class="card-area">
  <div class="card-shadow" id="cardShadow"></div>
  <div class="card" id="card">
    <div class="front-label" id="frontLabel"></div>
    <div class="hsk-tag"     id="hskTag"></div>
    <div class="front-block" id="frontBlock"></div>
    <div class="tap-hint"    id="tapHint">tap to reveal</div>
    <div class="reveal-block hidden" id="revealBlock"></div>
  </div>
</div>

<div class="bottom" id="bottom">
  <!-- Row 1: Reset · 00:00 · hide  /  show (centered) -->
  <div class="timer-row" id="timerRow">
    <button class="t-btn" id="timerReset" onclick="resetTimer()">Reset</button>
    <span class="timer-display" id="timerDisplay">00:00</span>
    <button class="t-btn" id="timerToggle" onclick="toggleTimerVisible()">hide</button>
  </div>
  <!-- Row 2: ← · pause · → -->
  <div class="action-row">
    <button class="nav-btn dimmed" id="btnBack"    onclick="historyBack()">←</button>
    <button class="pause-btn" id="btnPause" onclick="togglePause()">
      <!-- pause icon (two bars) shown by default; play icon shown when paused -->
      <svg id="iconPause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="4" width="4" height="16" rx="1.5"/>
        <rect x="15" y="4" width="4" height="16" rx="1.5"/>
      </svg>
      <svg id="iconPlay" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <path d="M6 4.5L20 12L6 19.5V4.5Z"/>
      </svg>
    </button>
    <button class="nav-btn dimmed" id="btnFwd"     onclick="historyFwdOrNext()">→</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let allSentences = [];
let filtered     = [];
let revealed     = false;
let animating    = false;
let hskActive    = new Set(['all']);
let dirSetting   = 'random';

// ── History (max 3) ────────────────────────────────────────────────────
const HIST_MAX = 3;
let hist    = [];   // [{sentence, mode}]
let histPos = -1;

function histPush(sentence, mode) {
  // truncate forward entries if we branched
  if (histPos < hist.length - 1) hist = hist.slice(0, histPos + 1);
  hist.push({ sentence, mode });
  if (hist.length > HIST_MAX) hist.shift();
  histPos = hist.length - 1;
  updateNavBtns();
}

function updateNavBtns() {
  const back = document.getElementById('btnBack');
  const fwd  = document.getElementById('btnFwd');
  back.classList.toggle('dimmed', histPos <= 0);
  // forward arrow: available if there's history ahead OR always (will pick new card)
  fwd.classList.remove('dimmed'); // always available — goes forward or new card
}

function historyBack() {
  if (histPos <= 0) return;
  histPos--;
  const e = hist[histPos];
  revealed = false;
  render(e.sentence, e.mode);
  updateNavBtns();
  resumeTimer();
}

function historyFwdOrNext() {
  if (histPos < hist.length - 1) {
    // go forward in existing history
    histPos++;
    const e = hist[histPos];
    revealed = false;
    render(e.sentence, e.mode);
    updateNavBtns();
    resumeTimer();
  } else {
    // new card
    animateSwipe('left');
  }
}

// ── CSV ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  return text.trim().split('\n').slice(1).map(line => {
    const c = line.split(',');
    return { zh: c[0]?.trim(), pinyin: c[1]?.trim(), english: c[2]?.trim(), hsk: parseInt(c[3]?.trim()) || 1 };
  }).filter(r => r.zh && r.english);
}

async function loadSentences() {
  try {
    const res  = await fetch('sentences.csv');
    const text = await res.text();
    allSentences = parseCSV(text);
    applyFilter();
    document.getElementById('status').classList.add('hidden');
    nextCard();
  } catch (e) {
    document.getElementById('statusMsg').textContent = "Could not load sentences.csv";
  }
}

// ── Filters ────────────────────────────────────────────────────────────
function toggleHSK(val) {
  if (val === 'all') {
    hskActive = new Set(['all']);
  } else {
    hskActive.delete('all');
    hskActive.has(val) ? hskActive.delete(val) : hskActive.add(val);
    if (hskActive.size === 0) hskActive = new Set(['all']);
  }
  document.querySelectorAll('.pill[data-hsk]').forEach(p =>
    p.classList.toggle('active', hskActive.has(p.dataset.hsk)));
  applyFilter();
  nextCard();
}

function applyFilter() {
  filtered = hskActive.has('all')
    ? allSentences
    : allSentences.filter(s => [...hskActive].map(Number).includes(s.hsk));
  if (!filtered.length) filtered = allSentences;
}

function setDir(val) {
  dirSetting = val;
  document.querySelectorAll('.pill[data-dir]').forEach(p =>
    p.classList.toggle('active', p.dataset.dir === val));
}

// ── Card ───────────────────────────────────────────────────────────────
function pickRandom() {
  const last = hist.length ? hist[hist.length - 1].sentence : null;
  let s;
  do { s = filtered[Math.floor(Math.random() * filtered.length)]; }
  while (s === last && filtered.length > 1);
  return s;
}

function nextCard() {
  const s    = pickRandom();
  const mode = dirSetting === 'zh' ? 'zh' : dirSetting === 'en' ? 'en' : (Math.random() < 0.5 ? 'zh' : 'en');
  histPush(s, mode);
  revealed = false;
  render(s, mode);
  resumeTimer();
}

function render(sentence, mode) {
  const badge       = document.getElementById('dirBadge');
  const frontLabel  = document.getElementById('frontLabel');
  const hskTag      = document.getElementById('hskTag');
  const frontBlock  = document.getElementById('frontBlock');
  const tapHint     = document.getElementById('tapHint');
  const revealBlock = document.getElementById('revealBlock');

  revealBlock.classList.add('hidden');
  tapHint.classList.remove('hidden');

  hskTag.textContent = `HSK ${sentence.hsk}`;
  hskTag.className   = `hsk-tag h${sentence.hsk}`;

  if (mode === 'zh') {
    badge.textContent      = '中 → EN';
    badge.className        = 'dir-badge zh';
    frontLabel.textContent = 'Chinese → English';
    frontBlock.innerHTML   = `<div class="zh-big">${sentence.zh}</div>`;
    revealBlock.innerHTML  = `<div class="py-reveal">${sentence.pinyin}</div><div class="en-reveal">${sentence.english}</div>`;
  } else {
    badge.textContent      = 'EN → 中';
    badge.className        = 'dir-badge en';
    frontLabel.textContent = 'English → Chinese';
    frontBlock.innerHTML   = `<div class="en-big">${sentence.english}</div>`;
    revealBlock.innerHTML  = `<div class="zh-reveal">${sentence.zh}</div><div class="py-reveal">${sentence.pinyin}</div>`;
  }
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  document.getElementById('revealBlock').classList.remove('hidden');
  document.getElementById('tapHint').classList.add('hidden');
  resumeTimer();
}

function animateSwipe(dir) {
  if (animating) return;
  animating = true;
  const card   = document.getElementById('card');
  const shadow = document.getElementById('cardShadow');
  shadow.classList.add('shadow-rise');
  card.classList.add(dir === 'left' ? 'swiping-left' : 'swiping-right');
  setTimeout(() => {
    card.classList.remove('swiping-left', 'swiping-right');
    shadow.classList.remove('shadow-rise');
    nextCard();
    animating = false;
  }, 260);
}

// ── Touch + Mouse swipe + Keyboard ────────────────────────────────────
(function() {
  const card = document.getElementById('card');
  let startX = 0, startY = 0, isSwiping = false, touchActive = false;

  // ── Touch ──
  card.addEventListener('touchstart', e => {
    startX      = e.touches[0].clientX;
    startY      = e.touches[0].clientY;
    isSwiping   = false;
    touchActive = true;
  }, { passive: true });

  card.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) isSwiping = true;
  }, { passive: true });

  card.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (isSwiping && Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.2) {
      animateSwipe(dx < 0 ? 'left' : 'right');
    } else if (!isSwiping) {
      revealCard();
    }
    isSwiping = false;
    setTimeout(() => { touchActive = false; }, 400);
  }, { passive: true });

  // ── Mouse swipe ──
  let mouseDown = false, mouseDragging = false;
  card.addEventListener('mousedown', e => {
    startX       = e.clientX;
    startY       = e.clientY;
    mouseDown    = true;
    mouseDragging= false;
  });
  window.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy)) mouseDragging = true;
  });
  window.addEventListener('mouseup', e => {
    if (!mouseDown) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (mouseDragging && Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.2) {
      animateSwipe(dx < 0 ? 'left' : 'right');
    } else if (!mouseDragging && e.target === card || card.contains(e.target)) {
      if (!touchActive) revealCard();
    }
    mouseDown    = false;
    mouseDragging= false;
  });

  // ── Keyboard ──
  document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
    switch (e.key) {
      case ' ':
      case 'Enter':
        e.preventDefault();
        revealCard();
        break;
      case 'ArrowRight':
      case 'ArrowDown':
        e.preventDefault();
        historyFwdOrNext();
        break;
      case 'ArrowLeft':
      case 'ArrowUp':
        e.preventDefault();
        historyBack();
        break;
    }
  });
})();

// ── Timer ──────────────────────────────────────────────────────────────
let timerSecs    = 0;
let timerPaused  = false;
let timerVisible = true;

function pad(n) { return String(n).padStart(2, '0'); }

function updateTimerDisplay() {
  document.getElementById('timerDisplay').textContent =
    `${pad(Math.floor(timerSecs / 60))}:${pad(timerSecs % 60)}`;
}

function resumeTimer() {
  if (!timerPaused) return;
  timerPaused = false;
  document.getElementById('btnPause').classList.remove('is-paused');
  document.getElementById('bottom').classList.remove('is-paused');
  document.getElementById('iconPause').style.display = '';
  document.getElementById('iconPlay').style.display  = 'none';
  document.querySelector('.card-area').classList.remove('is-paused');
}

function togglePause() {
  timerPaused = !timerPaused;
  document.getElementById('btnPause').classList.toggle('is-paused', timerPaused);
  document.getElementById('bottom').classList.toggle('is-paused', timerPaused);
  document.getElementById('iconPause').style.display = timerPaused ? 'none' : '';
  document.getElementById('iconPlay').style.display  = timerPaused ? '' : 'none';
  document.querySelector('.card-area').classList.toggle('is-paused', timerPaused);
}

function resetTimer() {
  timerSecs   = 0;
  timerPaused = false;
  document.getElementById('btnPause').classList.remove('is-paused');
  document.getElementById('bottom').classList.remove('is-paused');
  document.getElementById('iconPause').style.display = '';
  document.getElementById('iconPlay').style.display  = 'none';
  document.querySelector('.card-area').classList.remove('is-paused');
  updateTimerDisplay();
}

function toggleTimerVisible() {
  timerVisible = !timerVisible;
  const display = document.getElementById('timerDisplay');
  const reset   = document.getElementById('timerReset');
  const toggle  = document.getElementById('timerToggle');
  const row     = document.getElementById('timerRow');
  if (timerVisible) {
    display.style.display = '';
    reset.style.display   = '';
    toggle.textContent    = 'hide';
    row.style.justifyContent = 'center';
    row.style.gap = '20px';
  } else {
    display.style.display = 'none';
    reset.style.display   = 'none';
    toggle.textContent    = 'show';
    row.style.justifyContent = 'center';
    row.style.gap = '0';
  }
}

setInterval(() => {
  if (!timerPaused) { timerSecs++; updateTimerDisplay(); }
}, 1000);

loadSentences();
</script>
</body>
</html>
